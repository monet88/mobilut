// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '35.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '24')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '35')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '34')
        kotlinVersion = findProperty('android.kotlinVersion') ?: '1.9.25'

        ndkVersion = "26.1.10909125"
    }
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:${kotlinVersion}")
    }
    configurations.classpath.resolutionStrategy.eachDependency { details ->
        if (details.requested.group == "org.jetbrains.kotlin" &&
            details.requested.name.startsWith("kotlin-gradle-plugin")) {
            details.useVersion(rootProject.ext.kotlinVersion)
            details.because("Align Kotlin Gradle plugin with Compose compiler 1.5.15")
        }
    }
}

apply plugin: "com.facebook.react.rootproject"

allprojects {
    repositories {
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url(new File(['node', '--print', "require.resolve('react-native/package.json')"].execute(null, rootDir).text.trim(), '../android'))
        }
        maven {
            // Android JSC is installed from npm
            url(new File(['node', '--print', "require.resolve('jsc-android/package.json', { paths: [require.resolve('react-native/package.json')] })"].execute(null, rootDir).text.trim(), '../dist'))
        }

        google()
        mavenCentral()
        maven { url 'https://www.jitpack.io' }
    }
}

subprojects { subproject ->
    if (subproject.name == "app") {
        subproject.configurations.configureEach { configuration ->
            if (configuration.name == "debugRuntimeClasspath" || configuration.name == "releaseRuntimeClasspath") {
                configuration.resolutionStrategy.eachDependency { details ->
                    if (details.requested.group == "androidx.core" &&
                        (details.requested.name == "core" || details.requested.name == "core-ktx")) {
                        details.useVersion("1.15.0")
                        details.because("AGP 8.6 / compileSdk 35 compatibility for Expo SDK 52 stack")
                    }
                }
            }
        }
    }
}
